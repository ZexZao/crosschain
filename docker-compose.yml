services:
  evm-node:
    image: node:20
    working_dir: /app
    volumes:
      - ./:/app
    command: sh -c "npm install && npx hardhat node --hostname 0.0.0.0"
    ports:
      - "8545:8545"

  tee-verifier:
    image: node:20
    working_dir: /app
    environment:
      - TEE_NODE_ID=tee-verifier-1
      - TEE_CLUSTER_THRESHOLD=3
      - TEE_CLUSTER_PEERS=http://tee-verifier-2:9000,http://tee-verifier-3:9000,http://tee-verifier-4:9000
      - EVM_RPC=http://evm-node:8545
    volumes:
      - ./:/app
    command: sh -c "npm install && node tee-verifier/server.js"
    ports:
      - "9000:9000"
    depends_on:
      - evm-node

  tee-verifier-2:
    image: node:20
    working_dir: /app
    environment:
      - TEE_NODE_ID=tee-verifier-2
      - TEE_CLUSTER_THRESHOLD=3
      - TEE_CLUSTER_PEERS=http://tee-verifier:9000,http://tee-verifier-3:9000,http://tee-verifier-4:9000
      - EVM_RPC=http://evm-node:8545
    volumes:
      - ./:/app
    command: sh -c "npm install && node tee-verifier/server.js"
    ports:
      - "9001:9000"
    depends_on:
      - evm-node

  tee-verifier-3:
    image: node:20
    working_dir: /app
    environment:
      - TEE_NODE_ID=tee-verifier-3
      - TEE_CLUSTER_THRESHOLD=3
      - TEE_CLUSTER_PEERS=http://tee-verifier:9000,http://tee-verifier-2:9000,http://tee-verifier-4:9000
      - EVM_RPC=http://evm-node:8545
    volumes:
      - ./:/app
    command: sh -c "npm install && node tee-verifier/server.js"
    ports:
      - "9002:9000"
    depends_on:
      - evm-node

  tee-verifier-4:
    image: node:20
    working_dir: /app
    environment:
      - TEE_NODE_ID=tee-verifier-4
      - TEE_CLUSTER_THRESHOLD=3
      - TEE_CLUSTER_PEERS=http://tee-verifier:9000,http://tee-verifier-2:9000,http://tee-verifier-3:9000
      - EVM_RPC=http://evm-node:8545
    volumes:
      - ./:/app
    command: sh -c "npm install && node tee-verifier/server.js"
    ports:
      - "9003:9000"
    depends_on:
      - evm-node

  deployer:
    image: node:20
    working_dir: /app
    volumes:
      - ./:/app
    command: sh -c "npm install && npx hardhat compile && npx hardhat run scripts/deploy.js --network localhost"
    depends_on:
      - evm-node

  relayer:
    image: node:20
    working_dir: /app
    environment:
      - EVM_RPC=http://evm-node:8545
      - TEE_URL=http://tee-verifier:9000
    volumes:
      - ./:/app
    command: sh -c "npm install && tail -f /dev/null"
    depends_on:
      - evm-node
      - tee-verifier
